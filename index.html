<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Premium VPN — Ультимативная кибербезопасность</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+New:wght@700&family=Inter:wght@400;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #080b11;
            color: #ffffff;
            overflow: hidden;
        }

        .hide-cursor {
            cursor: none !important;
        }

        #customCursor {
            display: none;
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid #ff3333;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000000;
            transform: translate(-50%, -50%);
        }
        #customCursor::before, #customCursor::after {
            content: '';
            position: absolute;
            background: #ff3333;
        }
        #customCursor::before { top: 12px; left: -5px; width: 40px; height: 2px; }
        #customCursor::after { top: -5px; left: 12px; width: 2px; height: 40px; }

        /* ЭЛИТНЫЙ САЙТ */
        .site-wrapper {
            display: block;
            background: radial-gradient(circle at 80% 20%, rgba(79, 70, 229, 0.15) 0%, transparent 50%);
            padding: 100px 10%;
            height: 100%;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { font-size: 20px; font-weight: 800; color: #6366f1; }

        .hero { margin-top: 80px; text-align: center; }

        h1 { font-size: 50px; font-weight: 800; margin-bottom: 20px; }

        .btn-connect {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 20px 50px;
            font-size: 18px;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.5);
            transition: 0.3s;
            margin-top: 40px;
        }

        .btn-connect:hover { transform: translateY(-3px); }

        /* ТЕРМИНАЛ УДАЛЕНИЯ */
        .terminal-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            color: #ff3333;
            font-family: 'Consolas', monospace;
            padding: 50px;
            box-sizing: border-box;
            font-size: 16px;
            line-height: 1.6;
            z-index: 99998;
            overflow-y: auto;
        }

        .term-line { margin-bottom: 8px; }

        /* АРЕНА БОЯ */
        #bossArena {
            display: none;
            position: fixed;
            top: 0;
            left: 0;width: 100vw;
            height: 100vh;
            background: #050508;
            z-index: 99999;
        }

        .boss-container {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        .boss-avatar {
            font-size: 80px;
            animation: glitchAnimation 0.2s infinite;
            text-shadow: 0 0 25px #ff0055;
        }

        .boss-name {
            font-family: 'Courier New', monospace;
            color: #ff3333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .hp-bar { width: 100%; height: 25px; border: 3px solid #ff3333; background: #200; }

        .hp-fill { width: 100%; height: 100%; background: #ff3333; transition: width 0.1s ease-out; }

        .timer-display {
            position: absolute;
            top: 20px;
            right: 40px;
            font-family: 'Courier New', monospace;
            color: #ffcc00;
            font-size: 28px;
        }

        /* ПРОВОДНИК */
        .explorer {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 900px;
            height: 60%;
            background: #11151c;
            border: 2px solid #334155;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .exp-header {
            background: #1e293b;
            padding: 10px;
            font-size: 14px;
            border-bottom: 2px solid #334155;
            color: #94a3b8;
        }

        .exp-body { display: flex; flex: 1; }

        .sidebar { width: 200px; border-right: 2px solid #334155; padding: 15px; }

        .folder-link {
            padding: 8px;
            cursor: none;
            border-radius: 4px;
            margin-bottom: 5px;
            color: #fff;
            font-size: 14px;
        }
        .folder-link:hover { background: #1e293b; }

        .files-area {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            align-content: start;
            overflow-y: auto;
        }

        .item { text-align: center; font-size: 12px; cursor: none; padding: 10px; }
        .item:hover { background: rgba(255,255,255,0.05); }

        .icon { font-size: 40px; margin-bottom: 8px; display: block; }

        .fake-error {
            position: fixed;
            width: 300px;
            background: #f0f0f0;
            color: #000;
            border: 2px solid #000;
            padding: 15px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            z-index: 100000;
        }

        /* ПОБЕДА */
        #winScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; color: #000000;
            z-index: 1000000;
            flex-direction: column;
            justify-content: center; align-items: center;
        }
        #winScreen h1 { font-size: 70px; font-family: 'Courier New', monospace; }

        /* ПОРАЖЕНИЕ (Черный экран) */
        #deathScreen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 1000000;
        }

        @keyframes glitchAnimation {
            0% { transform: translate(0); }
            50% { transform: translate(-3px, 3px) scale(1.02); filter: hue-rotate(90deg); }
            100% { transform: translate(3px, -3px); }
        }
    </style>
</head>
<body id="mainBody">

    <!-- ОФИЦИАЛЬНЫЙ САЙТ -->
    <div class="site-wrapper" id="mainSite">
        <header>
            <div class="logo">⚡️ AEGIS.IO</div>
        </header>
        <section class="hero">
            <h1>Квантовая защита персональных данных</h1><p style="color: #64748b; margin-top: 10px;">Профессиональный VPN-клиент нового поколения.</p>
            <button class="btn-connect" onclick="initAndStartAll()">ПОДКЛЮЧИТЬ БЕЗОПАСНЫЙ ТУННЕЛЬ</button>
        </section>
    </div>

    <!-- ТЕРМИНАЛ УДАЛЕНИЯ -->
    <div class="terminal-screen" id="terminal">
        <div id="termContent"></div>
    </div>

    <!-- КАСТОМНЫЙ ПРИЦЕЛ -->
    <div id="customCursor"></div>

    <!-- АРЕНА ИГРЫ -->
    <div id="bossArena">
        <div class="timer-display" id="timer">60s</div>

        <!-- Босс -->
        <div class="boss-container">
            <div class="boss-name">ГЛЮК СИСТЕМЫ v11.3</div>
            <div class="boss-avatar" id="bossImg">💀</div>
            <div class="hp-bar">
                <div class="hp-fill" id="hpFill"></div>
            </div>
        </div>

        <!-- Проводник -->
        <div class="explorer">
            <div class="exp-header">Этот компьютер > Системный диск (C:) > <span id="currentPath">Корневой каталог</span></div>
            <div class="exp-body">
                <div class="sidebar">
                    <div class="folder-link" onclick="loadDirectory('root')">📁 Диск C:</div>
                    <div class="folder-link" onclick="loadDirectory('system32')">📁 System32</div>
                    <div class="folder-link" onclick="loadDirectory('user')">📁 Пользователь</div>
                    <div class="folder-link" onclick="loadDirectory('recovery')">📁 Резервные файлы</div>
                </div>
                <div class="files-area" id="filesContainer"></div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ПОБЕДЫ -->
    <div id="winScreen">
        <h1>ПОБЕДА!</h1>
        <p style="font-size: 20px; font-weight: bold; margin-top: 10px;">Система полностью очищена.</p>
    </div>

    <!-- СМЕРТЬ -->
    <div id="deathScreen"></div>

    <script>
        let bossHP = 100;
        let timeLeft = 60;
        let gameActive = false;
        let timerInterval;
        let audioCtx, musicInterval;

        const fileSystem = {
            root: [
                { name: 'Windows', icon: '📁', type: 'folder', target: 'system32' },
                { name: 'Users', icon: '📁', type: 'folder', target: 'user' },
                { name: 'RecoveryData', icon: '📁', type: 'folder', target: 'recovery' },
                { name: 'boot.log', icon: '📄', type: 'trash' },
                { name: 'cleaner.exe', icon: '🛡️', type: 'core', id: 1 },
                { name: 'config.sys', icon: '📄', type: 'trash' }
            ],
            system32: [
                { name: 'drivers', icon: '📁', type: 'folder', target: 'system32' },
                { name: 'kernel.dll', icon: '⚙️', type: 'trash' },
                { name: 'hal.dll', icon: '⚙️', type: 'trash' },
                { name: 'winlogon.exe', icon: '⚙️', type: 'trash' },
                { name: 'sys_patch.sys', icon: '🛡️', type: 'core', id: 2 },
                { name: 'net_shield.dll', icon: '🛡️', type: 'core', id: 3 },
                { name: 'registry_fix.reg', icon: '🛡️', type: 'core', id: 4 },
                { name: 'security_core.bin', icon: '🛡️', type: 'core', id: 5 }
            ],
            user: [
                { name: 'Desktop', icon: '📁', type: 'folder', target: 'user' },
                { name: 'Documents', icon: '📁', type: 'folder', target: 'user' },
                { name: 'photo_backup.zip', icon: '📦', type: 'trash' },
                { name: 'user_save.dat', icon: '🛡️', type: 'core', id: 6 },
                { name: 'restore_point.bin', icon: '🛡️', type: 'core', id: 7 },
                { name: 'passwords.encrypted', icon: '📄', type: 'trash' },
                { name: 'decrypter.exe', icon: '🛡️', type: 'core', id: 8 }
            ],
            recovery: [
                { name: 'os_backup_01.img', icon: '💿', type: 'trash' },
                { name: 'rec_sys_1.sys', icon: '🛡️', type: 'core', id: 9 },
                { name: 'rec_sys_2.sys', icon: '🛡️', type: 'core', id: 10 },
                { name: 'rec_sys_3.sys', icon: '🛡️', type: 'core', id: 11},
                { name: 'emergency_patch.bat', icon: '🛡️', type: 'core', id: 12 },
                { name: 'mbr_fixer.exe', icon: '🛡️', type: 'core', id: 13 },
                { name: 'uninstaller.dll', icon: '🛡️', type: 'core', id: 14 },
                { name: 'sys_restore_4.bin', icon: '🛡️', type: 'core', id: 15 },
                { name: 'safe_boot.cfg', icon: '🛡️', type: 'core', id: 16 },
                { name: 'antivirus_db.dat', icon: '🛡️', type: 'core', id: 17 },
                { name: 'core_rebuild.dll', icon: '🛡️', type: 'core', id: 18 },
                { name: 'network_reset.cmd', icon: '🛡️', type: 'core', id: 19 },
                { name: 'final_block.sys', icon: '🛡️', type: 'core', id: 20 }
            ]
        };

        const foundCores = new Set();

        document.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const cursor = document.getElementById('customCursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Функция вывода логов
        function addTerminalLine(text, delay, color = '#ff3333') {
            return new Promise(resolve => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.className = 'term-line';
                    line.style.color = color;
                    line.innerHTML = text;
                    const content = document.getElementById('termContent');
                    content.appendChild(line);
                    document.getElementById('terminal').scrollTop = content.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        // САМАЯ ВАЖНАЯ ИСПРАВЛЕННАЯ ФУНКЦИЯ КЛИКА
        function initAndStartAll() {
            // 1. Сразу форсируем полноэкранный режим при первом же клике по кнопке
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => console.log("Полноэкранный режим заблокирован"));
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }

            // 2. Инициализируем аудио-контекст ПОСЛЕ КЛИКА, чтобы браузер его разрешил
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            // 3. Запускаем терминал и сценарий удаления
            document.getElementById('mainSite').style.display = 'none';
            document.getElementById('terminal').style.display = 'block';
            runTerminalScenario();
        }

        async function runTerminalScenario() {
            await addTerminalLine(`> Подключение к серверу авторизации Aegis Secure Tunnel...`, 300, '#00ff66');
            await addTerminalLine(`> Конфигурация сетевых шлюзов... УСПЕШНО.`, 400, '#00ff66');
            await addTerminalLine(`--------------------------------------------------------------------------`, 200);
            await addTerminalLine(`[КРИТИЧЕСКИЙ СБОЙ] Сервер перегружен. Запущена петля обратной связи.`, 800);
            await addTerminalLine(`[ВНИМАНИЕ] Обнаружена критическая утечка пакетов данных!`, 600);
            await addTerminalLine(`> Экстренная защита: Запуск уничтожения файлов во избежание взлома...`, 1000);
            
            const deletions = [
                'C:\\Users\\User\\Desktop - Очищено.',
                'C:\\Users\\User\\Documents - Очищено.',
                'C:\\Windows\\System32\\hal.dll - Стерто.',
                'C:\\Windows\\System32\\drivers\\etc\\hosts - Удалено.'
            ];

            for (let del of deletions) {
                await addTerminalLine(`[УДАЛЕНИЕ] ${del}`, 800);
            }

            await addTerminalLine(`--------------------------------------------------------------------------`, 300);
            await addTerminalLine(`> Завершение работы системы через 3...`, 800);
            await addTerminalLine(`> Завершение работы системы через 2...`, 800);
            await addTerminalLine(`> Завершение работы системы через 1...`, 800);

            // Переход в игру
            document.getElementById('terminal').style.display = 'none';
            enterGameMode();
        }

        function enterGameMode() {
            document.getElementById('bossArena').style.display = 'block';
            document.getElementById('customCursor').style.display = 'block';
            document.getElementById('mainBody').classList.add('hide-cursor');
            
            gameActive = true;
            loadDirectory('root');
            startTimer();
            startGlitchMusic(); 
        }

        // Музыка (теперь заиграет 100%!)
        function startGlitchMusic() {
            let step = 0;
            const notes = [110, 110, 150, 110, 80, 110, 180, 110]; 

            musicInterval = setInterval(() => {
                if (!gameActive || !audioCtx) return;
                
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.18);
                
                if (step % 4 === 0) {
                    let noise = audioCtx.createOscillator();
                    let noiseGain = audioCtx.createGain();
                    noise.type = 'triangle';
                    noise.frequency.setValueAtTime(Math.random() * 800 + 400, audioCtx.currentTime);
                    noiseGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    noise.connect(noiseGain);
                    noiseGain.connect(audioCtx.destination);
                    noise.start();
                    noise.stop(audioCtx.currentTime + 0.08);
                }

                step++;
            }, 180);
        }

        function loadDirectory(dir) {
            const container = document.getElementById('filesContainer');
            const pathText = document.getElementById('currentPath');
            container.innerHTML = '';
            pathText.innerText = dir === 'root' ? 'Диск C:\\' : `Диск C:\\${dir}\\`;

            fileSystem[dir].forEach(item => {
                if (item.type === 'core' && foundCores.has(item.id)) return;

                const element = document.createElement('div');
                element.className = 'item';
                element.innerHTML = `<span class="icon">${item.icon}</span>${item.name}`;
                
                element.addEventListener('click', () => {
                    if (item.type === 'folder') {
                        loadDirectory(item.target);
                    } else if (item.type === 'core') {
                        damageBoss(item.id, dir);
                    } else {
                        triggerGlitchEffect();
                    }
                });

                container.appendChild(element);
            });
        }

        function damageBoss(id, currentDir) {
            if (foundCores.has(id)) return;
            foundCores.add(id);

            bossHP -= 5; 
            document.getElementById('hpFill').style.width = bossHP + '%';
            
            const bossImg = document.getElementById('bossImg');
            bossImg.style.fontSize = '120px';
            setTimeout(() => bossImg.style.fontSize = '80px', 150);

            if (audioCtx) {
                let hitOsc = audioCtx.createOscillator();
                let hitGain = audioCtx.createGain();
                hitOsc.type = 'sine';
                hitOsc.frequency.setValueAtTime(600, audioCtx.currentTime);
                hitOsc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                hitGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                hitOsc.connect(hitGain);
                hitGain.connect(audioCtx.destination);
                hitOsc.start();
                hitOsc.stop(audioCtx.currentTime + 0.3);
            }

            if (bossHP <= 0) {
                endGame(true);
            } else {
                loadDirectory(currentDir);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft + 's';
                
                if (timeLeft % 8 === 0) {
                    triggerGlitchEffect();
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame(false);
                }
            }, 1000);
        }

        function triggerGlitchEffect() {
            for (let i = 0; i < 3; i++) {
                const error = document.createElement('div');
                error.className = 'fake-error';
                error.style.top = Math.random() * (window.innerHeight - 150) + 'px';
                error.style.left = Math.random() * (window.innerWidth - 300) + 'px';
                error.innerHTML = `
                    <div style="font-weight:bold;border-bottom:1px solid #000;padding-bottom:5px;margin-bottom:10px;">System Glitch</div>
                    <div>Ошибка перезаписи кластера памяти!</div>
                    <button style="margin-top:10px;padding:3px 10px;cursor:none;" onclick="this.parentElement.remove()">ИГНОРИРОВАТЬ</button>
                `;
                document.body.appendChild(error);
            }
        }

        function endGame(isVictory) {
            gameActive = false;
            clearInterval(timerInterval);
            clearInterval(musicInterval);
            if (audioCtx) audioCtx.close();
            
            document.getElementById('bossArena').style.display = 'none';
            document.getElementById('customCursor').style.display = 'none';
            document.getElementById('mainBody').classList.remove('hide-cursor');
            
            document.querySelectorAll('.fake-error').forEach(el => el.remove());

            if (isVictory) {
                document.getElementById('winScreen').style.display = 'flex';
            } else {
                document.getElementById('deathScreen').style.display = 'block';
            }
        }
    </script>
</body>
</html>
